services:

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DEBUG=${DEBUG}
    volumes:
      - .:/app:cached
    env_file:
      - ./.env
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    ports:
      - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy
    command: scripts/entrypoint.sh
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
          - DEBUG=${DEBUG}
    env_file:
      - ./.env
    command: uv run celery -A src.worker.celery worker -l info -P solo
    depends_on:
      - backend
      - redis


  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      args:
          - DEBUG=${DEBUG}
    command: uv run celery -A src.worker.celery beat --loglevel=INFO
    env_file:
      - ./.env
    depends_on:
      - backend
      - redis

  redis:
    container_name: redis
    image: redis:latest
    ports:
      - 6379:6379
    restart: unless-stopped


  postgres:
    container_name: postgres
    image: postgres:15.1-bullseye
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
    environment:
      - TZ=Europe/Kiev
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

    env_file:
      - ./.env
    ports:
      - 5432:5432
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

